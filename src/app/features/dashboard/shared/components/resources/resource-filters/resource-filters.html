<div class="dashboard-card p-5">
  <div class="flex flex-col md:flex-row gap-4 items-start md:items-end">
    <!-- Catégorie Dropdown -->
    <div class="flex-1 min-w-0">
      <label for="category-filter" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
        Catégorie
      </label>
      <select
        id="category-filter"
        [value]="selectedCategory() ?? ''"
        (change)="onCategoryChangeFromEvent($event)"
        class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors">
        <option value="">Toutes les catégories</option>
        @for (cat of categories; track cat.value) {
        <option [value]="cat.value">{{ cat.label }}</option>
        }
      </select>
    </div>

    <!-- Reset Button -->
    <button
      type="button"
      (click)="resetFilters()"
      class="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 text-sm font-medium rounded-lg transition-colors whitespace-nowrap">
      <i-lucide [name]="icons.clear" [size]="16" />
      <span>Réinitialiser</span>
    </button>
  </div>
</div>
