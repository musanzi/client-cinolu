<header
  class="h-18 dashboard-header-safe-area bg-white border-b border-slate-200 sticky top-0 z-40 flex items-center px-4 sm:px-6 lg:px-12 gap-2 sm:gap-4"
  role="banner">
  <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
    @if (isMobile()) {
    <button
      (click)="toggleSidebar.emit()"
      type="button"
      class="min-h-11 flex items-center justify-center hover:bg-slate-100 rounded-lg transition-colors lg:hidden -ml-1">
      <i-lucide [name]="icons.menu" class="w-5 h-5 text-slate-600" />
    </button>
    }

    <div class="hidden md:flex items-center gap-2 flex-1">
      <div
        class="inline-flex items-center gap-2 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-600"
        role="status">
        <i-lucide [name]="icons.clock" class="w-3.5 h-3.5" />
        <time [attr.datetime]="currentTime().toISOString()" class="flex items-baseline gap-2">
          <span class="dashboard-clock font-semibold"> {{ displayTime() }} </span>
          <span class="dashboard-date-label text-slate-600 text-xs hidden sm:inline"> {{ dateLabel() }} </span>
        </time>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-2 md:gap-3">
    <a
      routerLink="/dashboard/user"
      class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg text-slate-700 text-xs font-semibold transition-colors">
      <i-lucide [name]="icons.dashboard" class="w-4 h-4" />
      <span>Tableau de bord</span>
    </a>

    <div
      class="hidden lg:flex items-center gap-2 bg-linear-to-br from-primary-50 to-primary-100/50 rounded-lg px-3 py-1.5 border border-primary-200/60">
      <i-lucide [name]="icons.key" class="w-3.5 h-3.5 text-primary-600" />
      <span class="text-xs font-bold text-primary-700 tracking-wider">{{ referralCode() }}</span>
    </div>

    <a
      href="/contact-us"
      target="_blank"
      aria-label="Ouvrir la page de contact"
      title="Contact"
      class="p-2 hover:bg-amber-50 rounded-lg transition-colors group">
      <i-lucide [name]="icons.help" class="w-5 h-5 text-slate-600 group-hover:text-amber-600 transition-colors" />
    </a>

    <div class="h-8 w-px bg-slate-200 hidden md:block"></div>

    <div class="relative">
      <button
        (click)="onUserMenuClick($event)"
        type="button"
        class="user-menu-button flex items-center gap-2.5 hover:bg-slate-50 rounded-lg pl-2 pr-3 py-1.5 transition-colors group">
        <div class="relative">
          @if (user()?.profile || user()?.google_image) {
          <div
            class="relative w-9 h-9 min-w-9 min-h-9 rounded-lg overflow-hidden ring-2 ring-slate-200 group-hover:ring-primary-300 transition-all">
            <img priority [ngSrc]="user() | apiIMG: 'user'" [alt]="user()?.name" fill class="object-cover" />
          </div>
          } @else {
          <div
            class="w-9 h-9 rounded-lg bg-linear-to-br from-primary-500/90 to-primary-600/90 flex items-center justify-center font-bold text-white text-xs shadow-sm ring-2 ring-slate-200 group-hover:ring-primary-300 transition-all">
            {{ getUserInitials() }}
          </div>
          }
          <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></div>
        </div>

        <div class="hidden md:block text-left">
          <p class="text-xs font-semibold text-slate-900 leading-tight">{{ user()?.name }}</p>
          <p class="text-xs text-slate-500">{{ getRoleLabel() }}</p>
        </div>

        <i-lucide
          [name]="icons.chevronDown"
          [ngClass]="{ 'rotate-180': showUserMenu() }"
          class="w-4 h-4 text-slate-600 transition-transform hidden md:block" />
      </button>

      @if (showUserMenu()) {
      <div
        class="user-menu-dropdown absolute right-0 top-full mt-2 w-56 bg-white rounded-lg shadow-xl border border-slate-200 overflow-hidden anim-fade-in">
        <div class="px-4 py-3 border-b border-slate-200">
          <p class="font-semibold text-sm text-slate-900">{{ user()?.name }}</p>
          <p class="text-xs text-slate-500">{{ user()?.email }}</p>
          <span
            class="inline-flex items-center gap-1 mt-2 px-2 py-1 bg-primary-50 text-primary-700 rounded text-xs font-semibold">
            <i-lucide [name]="icons.verified" class="w-3 h-3" />
            {{ getRoleLabel() }}
          </span>
        </div>

        <div class="py-1">
          <a
            (click)="closeUserMenu()"
            routerLink="/dashboard/user"
            class="flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 transition-colors group">
            <i-lucide [name]="icons.dashboard" class="w-4 h-4 text-slate-500 group-hover:text-primary-600" />
            <span class="text-sm text-slate-700 group-hover:text-slate-900">Tableau de bord</span>
          </a>

          <a
            (click)="closeUserMenu()"
            routerLink="/dashboard/mentor/profile"
            class="flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 transition-colors group">
            <i-lucide [name]="icons.badge" class="w-4 h-4 text-slate-500 group-hover:text-primary-600" />
            <span class="text-sm text-slate-700 group-hover:text-slate-900">Mon Profil Mentor</span>
          </a>
        </div>

        <div class="border-t border-slate-200 py-1">
          <button
            (click)="signOut()"
            type="button"
            class="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-red-50 transition-colors group text-left">
            <i-lucide [name]="icons.logout" class="w-4 h-4 text-slate-500 group-hover:text-red-600" />
            <span class="text-sm text-slate-700 group-hover:text-red-600 font-medium">Déconnexion</span>
          </button>
        </div>
      </div>
      }
    </div>
  </div>
</header>
