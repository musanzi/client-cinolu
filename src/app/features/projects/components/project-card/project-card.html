<div
  class="group relative flex h-full flex-col w-full bg-white border border-slate-200 hover:border-primary-400 rounded-lg overflow-hidden transition-all duration-500 hover:shadow-xl hover:shadow-primary-500/10 hover:-translate-y-1">
  <div class="absolute top-4 left-4 z-10">
    <span
      class="inline-flex items-center px-3 py-1 bg-white/90 backdrop-blur-sm text-primary-700 text-[10px] font-bold uppercase tracking-widest rounded-md shadow-sm border border-slate-100">
      Programme
    </span>
  </div>

  <div class="relative overflow-hidden aspect-video w-full">
    <img
      fill
      [ngSrc]="project() | apiIMG: 'project'"
      [alt]="project().name"
      class="w-full h-full object-cover transition-transform duration-700 ease-in-out group-hover:scale-110" />

    <div
      class="absolute inset-0 bg-linear-to-t from-slate-900 via-slate-900/30 to-transparent opacity-80 group-hover:opacity-90 transition-opacity duration-300"></div>

    <div class="absolute bottom-0 left-0 right-0 p-5">
      <h3 class="font-extrabold text-lg font-satoshi text-white leading-snug line-clamp-2">
        {{ project().name | titlecase }}
      </h3>
    </div>
  </div>

  <div class="flex-1 flex flex-col p-6 space-y-5">
    <div class="flex-1">
      <p class="text-slate-600 text-sm sm:text-base leading-relaxed line-clamp-3 max-w-prose">
        {{ project().description }}
      </p>
    </div>

    <div class="grid grid-cols-2 border border-slate-100 rounded-lg overflow-hidden">
      <div class="flex items-center gap-3 p-3 bg-slate-50/50 border-r border-slate-100">
        <div class="flex items-center justify-center size-8 bg-white shadow-sm rounded-md text-emerald-500">
          <i-lucide class="size-4" [name]="icons.calendarCheck" />
        </div>

        <div class="flex flex-col min-w-0">
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight"> Début </span>
          <span class="text-xs font-semibold text-slate-700 truncate">
            {{ project().started_at | date: 'shortDate' }}
          </span>
        </div>
      </div>

      <div class="flex items-center gap-3 p-3 bg-slate-50/50">
        <div class="flex items-center justify-center size-8 bg-white shadow-sm rounded-md text-rose-500">
          <i-lucide class="size-4" [name]="icons.calendarX" />
        </div>

        <div class="flex flex-col min-w-0">
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight"> Fin </span>
          <span class="text-xs font-semibold text-slate-700 truncate">
            {{ project().ended_at | date: 'shortDate' }}
          </span>
        </div>
      </div>
    </div>

    <div class="pt-2">
      <a
        [routerLink]="['/programs', project().slug]"
        class="inline-flex items-center gap-2 font-satoshi text-primary-600 font-bold text-sm uppercase tracking-wider group/link hover:text-primary-700 transition-colors">
        {{ buttonTextKey() | translate }}

        <i-lucide
          class="size-4 transition-transform duration-300 group-hover/link:translate-x-1"
          [name]="icons.moveRight" />
      </a>
    </div>
  </div>
</div>
